dataset:
  name: rubert_moderation_v2
  # Keep the previous 200k export intact until this strict 800k build succeeds.
  output_dir: data/exports/rubert_moderation_v2
  total_examples: 1050000
  negative_examples: 650000
  safe_examples: 400000
  # Load exactly the configured quota. Class balancing and deterministic edge
  # cases already provide reserve candidates; reading more only delays builds.
  candidate_load_multiplier: 1.0
  # 12 logical CPUs on the current 16-thread machine.  The builder keeps the
  # remaining capacity for Discord, the OS and the database.
  workers: 12
  source_workers: 4
  cpu_limit_percent: 80
  # Candidate checkpoints make quota iterations resumable. Change this version
  # whenever source mappings or deterministic relabeling logic changes.
  checkpoint_version: v2
  reuse_checkpoints: true
  random_seed: 42
  strict: true

splits:
  train: 0.70
  validation: 0.15
  test: 0.15

negative_class_distribution:
  SPAM: 0.12
  INVITE: 0.07
  ADVERTISEMENT: 0.06
  SCAM: 0.12
  TOXIC: 0.22
  PROFANITY: 0.09
  POLITICS_IRL: 0.05
  HATE: 0.06
  THREAT: 0.04
  NSFW: 0.065
  EVASION: 0.05
  URL: 0.055

source_distribution:
  project: 0.02
  project_raw: 0.02
  russian_discord_chat_logs: 0.01
  russian_telegram_chat_logs: 0.02
  russian_dialogues_2: 0.095
  russian_tiny_conversations: 0.095
  russian_toxicity: 0.015
  russian_toxic_merged: 0.10
  hard_toxic_real: 0.03
  russian_toxic_comments: 0.045
  russian_toxic_dvach: 0.025
  russian_paradetox: 0.01
  russian_react_hate: 0.015
  russian_inappropriate: 0.04
  russian_nsfw_benchmark: 0.01
  russian_nsfw_fiction: 0.04
  russian_spam: 0.02
  russian_spam_fork: 0.01
  russian_scam_spam_public: 0.01
  phishing_url: 0.025
  discord_phishing_scam: 0.01
  russian_dialogues_safe: 0.02
  russian_dialogsum_safe: 0.03
  russian_literature_safe: 0.02
  russian_kinship_hard_safe: 0.02
  manual_synthetic: 0.03
  contextual_contrast: 0.02
  ai_generated_edge: 0.025
  russian_robustness: 0.13
  hard_scam_real: 0.02
  hard_nsfw_real: 0.02

sources:
  project:
    enabled: true
    path: data/exports/project_training_examples.jsonl
  project_raw:
    enabled: true
    path: data/raw/discord_messages.jsonl
  russian_discord_chat_logs:
    enabled: true
    local_path: data/raw/hf/KvaytG_russian_discord_chat_logs/corpus.parquet
  russian_telegram_chat_logs:
    enabled: true
    local_path: data/raw/hf/KvaytG_russian_telegram_chat_logs/corpus.parquet
  russian_dialogues_2:
    enabled: true
    local_path: data/raw/hf/Den4ikAI_russian_dialogues_2/dataset.jsonl.gz
  russian_tiny_conversations:
    enabled: true
    local_path: data/raw/hf/igorktech_tiny_conversations/data/train-00000-of-00001.parquet
  hard_toxic_real:
    enabled: true
    local_path: data/raw/hf/NiGuLa_Russian_Sensitive_Topics/sensitive_topics.csv
  hard_scam_real:
    enabled: true
    local_path: data/raw/hf/Abdurohman_fraudlens-ru-v1/fraudlens_v2_combined.jsonl
  hard_nsfw_real:
    enabled: true
    local_path: data/raw/hf/NiGuLa_Russian_Sensitive_Topics/sensitive_topics.csv
  russian_toxicity:
    enabled: true
    dataset_id: textdetox/multilingual_toxicity_dataset
    split: ru
    local_path: data/raw/hf/textdetox_multilingual_toxicity_dataset/data/ru-00000-of-00001.parquet
  # This MIT-licensed merge is sampled only after text-level deduplication, since
  # it includes several earlier Russian toxicity corpora.
  russian_toxic_merged:
    enabled: true
    dataset_id: Mnwa/russian-toxic
    split: train
  russian_spam:
    enabled: true
    dataset_id: ruSpamModels/russian-spam-detection
    split: train
    gated: true
    local_path: data/raw/hf/ruSpamModels_russian_spam_detection/processed_combined.parquet
  russian_toxic_comments:
    enabled: true
    dataset_id: AlexSham/Toxic_Russian_Comments
    split: train
    local_path: data/raw/hf/AlexSham_Toxic_Russian_Comments/train.jsonl
  russian_toxic_dvach:
    enabled: true
    dataset_id: marriamaslova/toxic_dvach
    split: train
    local_path: data/raw/hf/marriamaslova_toxic_dvach/labeled.csv
  russian_paradetox:
    enabled: true
    dataset_id: textdetox/multilingual_paradetox
    split: ru
  russian_react_hate:
    enabled: true
    dataset_id: htyeh/REACT
    splits:
      - rus_lgbtq
      - rus_war
    local_paths:
      - data/raw/hf/htyeh_REACT/data/rus_lgbtq-00000-of-00001.parquet
      - data/raw/hf/htyeh_REACT/data/rus_war-00000-of-00001.parquet
  russian_inappropriate:
    enabled: true
    dataset_id: NiGuLa/Russian_Inappropriate_Messages
    split: train
    toxic_threshold: 0.75
    safe_threshold: 0.25
    local_path: data/raw/hf/NiGuLa_Russian_Inappropriate_Messages/Inappapropriate_messages.csv
  russian_nsfw_benchmark:
    enabled: true
    dataset_id: redmadrobot-rnd/nsfw_benchmark
    split: test
  russian_nsfw_fiction:
    enabled: true
    dataset_id: krplt/ru-fictext-nsfw
    split: train
    local_path: data/raw/hf/krplt_ru_fictext_nsfw/ru-fictext-nsfw-data.parquet
  russian_dialogues_safe:
    enabled: true
    dataset_id: Den4ikAI/russian_dialogues
    split: train
  russian_literature_safe:
    enabled: true
    dataset_id: RafaelUI/russian_literature
    split: train
    local_path: data/raw/hf/RafaelUI_russian_literature/ruslit_corpus.jsonl
  russian_spam_fork:
    enabled: true
    dataset_id: benzlokzik/russian-spam-fork
    split: train
    local_path: data/raw/hf/benzlokzik_russian_spam_fork/processed_combined.parquet
  russian_scam_spam_public:
    enabled: true
    dataset_id: FredZhang7/all-scam-spam
    split: train
  phishing_url:
    enabled: true
    dataset_id: EustassKidman/malicious-url
    split: train
  discord_phishing_scam:
    enabled: true
    dataset_id: wangyuancheng/discord-phishing-scam
    split: train
  russian_dialogsum_safe:
    enabled: true
    dataset_id: d0rj/dialogsum-ru
    split: train
    local_path: data/raw/hf/d0rj_dialogsum_ru/data/train-00000-of-00001-bcc43b46acda4001.parquet
  russian_kinship_hard_safe:
    enabled: true
    datasets:
      - dataset_id: Den4ikAI/russian_dialogues
        split: train
        kind: dialogue_qa
      - dataset_id: RafaelUI/russian_literature
        split: train
        kind: literature
      - dataset_id: inkoziev/Conversations
        split: train
        kind: generic_dialogue
  manual_synthetic:
    enabled: true
  contextual_contrast:
    enabled: true
  ai_generated_edge:
    enabled: true
  russian_robustness:
    enabled: true

quality:
  deduplicate_by_text: true
  min_text_length: 3
  max_text_length: 512
  test_allowed_sources:
    - project
    - russian_toxicity
    - russian_toxic_merged
    - russian_dialogues_safe
    - russian_literature_safe
    - russian_kinship_hard_safe
    - russian_spam
    - manual_synthetic
    - russian_robustness
