model:
  base_model_name: cointegrated/rubert-tiny2
  base_model_revision: e8ed3b0c8bbf4fb6984c3de043bf7d2f4e5969ae
  local_base_dir: models/rubert-tiny2
  classifier_output_dir: models/rubert-tiny2-moderation-init
  max_length: 512
  problem_type: multi_label_classification

training:
  train_batch_size: 32       
  eval_batch_size: 128
  gradient_accumulation_steps: 2 
  learning_rate: 0.00002
  num_train_epochs: 4
  warmup_ratio: 0.03
  weight_decay: 0.01
  fp16: true
  threshold: 0.5

labels:
  - SAFE
  - SPAM
  - ADVERTISEMENT
  - INVITE
  - SCAM
  - TOXIC
  - PROFANITY
  - POLITICS_IRL
  - HATE
  - THREAT
  - NSFW
  - EVASION
  - FLOOD
  - URL
  - IMAGE_SCAM
