policy_id: "default_moderation_rule_policy"
version: "1.0.0"

risk_score:
  min: 0
  max: 100

source_weights:
  PREPROCESSING: 1.0
  RUBERT: 1.2
  QWEN: 1.5
  OCR: 1.0
  IMAGE: 1.0
  HISTORY: 0.8
  MANUAL: 2.0
  PHISHING: 1.4

label_weights:
  SAFE: 0
  SPAM: 20
  ADVERTISEMENT: 15
  INVITE: 10
  SCAM: 50
  TOXIC: 40
  # Severity=1 has a 0.5 multiplier, so this yields about 3.8 risk at 0.94 confidence.
  PROFANITY: 8
  POLITICS_IRL: 18
  HATE: 60
  THREAT: 80
  NSFW: 70
  EVASION: 30
  FLOOD: 10
  URL: 5
  IMAGE_SCAM: 50

confidence_thresholds:
  default_min_confidence: 0.4
  per_source_min_confidence:
    PREPROCESSING: 0.3
    RUBERT: 0.5
    QWEN: 0.6
    PHISHING: 0.5
  per_label_min_confidence:
    THREAT: 0.3
    HATE: 0.3
    SAFE: 0.1

severity_multipliers:
  0: 0.0
  1: 0.5
  2: 0.8
  3: 1.0
  4: 1.2
  5: 1.5

primary_label_priority:
  - THREAT
  - HATE
  - SCAM
  - NSFW
  - TOXIC
  - POLITICS_IRL
  - PROFANITY
  - INVITE
  - FLOOD
  - SPAM
  - ADVERTISEMENT
  - URL
  - EVASION
  - SAFE

conflict_rules:
  - rule_id: "safe_conflict"
    description: "SAFE + harmful labels -> SAFE not primary"
    condition: "has_harmful_labels"
    action: "exclude_safe_from_primary"
  - rule_id: "url_scam_conflict"
    description: "URL + SCAM -> SCAM primary if confidence high"
    condition: "has_url_and_scam"
    action: "prefer_scam"

model_agreement:
  enabled: true
  agreement_bonus: 0.2
  disagreement_penalty: 0.3
  high_confidence_threshold: 0.8

# The same payload can be stored at a guild scope, so these values are
# independently configurable for every Discord server.
user_risk:
  enabled: true
  new_account_days: 7
  new_member_days: 7
  recent_violation_count_key: recent_violation_count
  violation_threshold: 3
  new_account_multiplier: 1.15
  new_member_multiplier: 1.1
  repeat_violation_multiplier: 1.35
  max_multiplier: 1.75

phishing:
  # With an existing SCAM signal, a threat-registry match is emitted directly.
  # A URL absent from the registry requires a fresh domain and suspicious URL
  # indicators as additional evidence.
  enabled: false
  domain_max_age_days: 7
  max_urls_per_message: 5
  minimum_bad_indicators: 1
  max_domain_labels: 4
  severity: 5
  confidence: 0.95
  risk_weight: 85
  reason: phishing_new_unlisted_scam_url
  suspicious_keywords: [airdrop, bonus, claim, crypto, gift, login, promo, verify, wallet]
